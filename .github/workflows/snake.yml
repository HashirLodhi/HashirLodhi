name: Generate contribution animation

on:
  # GitHub does not forward pushes from other repositories to the profile
  # repository. Poll often so contributions from those repositories still
  # reach the animation quickly.
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  # Other repositories can send this event after a push for a near-instant
  # refresh (event_type: contribution-update).
  repository_dispatch:
    types:
      - contribution-update
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: contribution-animation
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate light and dark SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#111111&color_dots=#f5f5f5,#d4d4d4,#a3a3a3,#525252,#171717
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ffffff&color_dots=#171717,#404040,#737373,#a3a3a3,#e5e5e5

      - name: Publish animation assets
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
          commit_message: "chore: refresh contribution animation"
