<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#050505" />
  <title>Hashir Lodhi — Interactive AI</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #050505; color: #fff; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { position: relative; width: 100%; height: 100%; background: radial-gradient(circle at 50% 45%, #fff 0 25%, #e9e9e9 55%, #cfcfcf 100%); }
    spline-viewer { display: block; width: 100%; height: 100%; }
    .topbar { position: absolute; inset: 0 0 auto; z-index: 3; display: flex; align-items: center; justify-content: space-between; padding: 22px 26px; pointer-events: none; }
    .brand, .back { border: 1px solid rgba(0,0,0,.18); background: rgba(255,255,255,.76); color: #080808; box-shadow: 0 12px 40px rgba(0,0,0,.09); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .brand { padding: 11px 15px; border-radius: 999px; font-size: 11px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
    .back { pointer-events: auto; padding: 11px 15px; border-radius: 999px; font-size: 12px; font-weight: 700; text-decoration: none; transition: transform .2s ease, background .2s ease; }
    .back:hover { transform: translateY(-2px); background: #fff; }
    .hint { position: absolute; z-index: 3; left: 50%; bottom: 25px; transform: translateX(-50%); margin: 0; padding: 10px 14px; border-radius: 999px; color: #111; background: rgba(255,255,255,.78); border: 1px solid rgba(0,0,0,.14); box-shadow: 0 12px 36px rgba(0,0,0,.1); backdrop-filter: blur(16px); font-size: 12px; font-weight: 650; white-space: nowrap; pointer-events: none; }
    @media (max-width: 560px) { .topbar { padding: 14px; } .brand { display: none; } .topbar { justify-content: flex-end; } .hint { bottom: 16px; } }
  </style>
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.98/build/spline-viewer.js"></script>
</head>
<body>
  <main>
    <div class="topbar">
      <span class="brand">Hashir Lodhi · AI Systems</span>
      <a class="back" href="https://github.com/HashirLodhi">Back to GitHub ↗</a>
    </div>
    <spline-viewer loading-anim-type="spinner-small-dark" url="https://prod.spline.design/gK4Rs3Br2IqpULHy/scene.splinecode"></spline-viewer>
    <p class="hint">Move your cursor — the robot follows you</p>
  </main>
</body>
</html>
