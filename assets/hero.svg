<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Muhammad Hashir Lodhi — AI Engineer</title>
  <desc id="desc">Minimal black and white animated banner introducing Muhammad Hashir Lodhi and the AI systems he builds.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.62" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="1" stop-color="#525252"/>
    </linearGradient>
    <radialGradient id="softSpot">
      <stop offset="0" stop-color="#000000" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#000000" opacity="0.045"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <filter id="smallShadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
    <clipPath id="frame"><rect width="1200" height="430" rx="28"/></clipPath>
  </defs>
  <style>
    .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
    .mono { font-family: "JetBrains Mono", Consolas, monospace; }
    .float { animation: float 5s ease-in-out infinite; }
    .orbit { animation: orbit 18s linear infinite; transform-box: fill-box; transform-origin: center; }
    .word1 { animation: word1 9s ease-in-out infinite; }
    .word2 { opacity: 0; animation: word2 9s ease-in-out infinite; }
    .word3 { opacity: 0; animation: word3 9s ease-in-out infinite; }
    .eye { animation: blink 4.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .eye.two { animation-delay: .08s; }
    .cursor { animation: cursor 1s steps(2, end) infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    @keyframes orbit { to { transform: rotate(360deg); } }
    @keyframes word1 { 0%,29% { opacity: 1; transform: translateY(0); } 33%,96% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; } }
    @keyframes word2 { 0%,29%,66%,100% { opacity: 0; transform: translateY(6px); } 33%,62% { opacity: 1; transform: translateY(0); } }
    @keyframes word3 { 0%,62%,100% { opacity: 0; transform: translateY(6px); } 66%,96% { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%,44%,48%,100% { transform: scaleY(1); } 46% { transform: scaleY(.08); } }
    @keyframes cursor { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } .word2,.word3 { display: none; } }
  </style>

  <g clip-path="url(#frame)">
    <rect width="1200" height="430" fill="url(#paper)"/>
    <rect width="1200" height="430" fill="url(#dots)"/>
    <circle cx="1085" cy="80" r="280" fill="url(#softSpot)"/>
    <text x="47" y="94" fill="#eeeeee" font-size="82" font-weight="900" class="sans">01</text>

    <g transform="translate(58 47)">
      <rect width="142" height="30" rx="15" fill="#f5f5f5" stroke="#d4d4d4"/>
      <circle cx="17" cy="15" r="3.5" fill="#111111"/>
      <text x="29" y="19.5" fill="#404040" font-size="11" font-weight="700" letter-spacing="1.7" class="mono">AI ENGINEER</text>

      <text y="112" fill="#050505" font-size="47" font-weight="850" letter-spacing="-1.7" class="sans">MUHAMMAD HASHIR LODHI</text>
      <rect y="128" width="585" height="3" rx="1.5" fill="url(#ink)"/>

      <text y="180" fill="#737373" font-size="19" font-weight="550" class="sans">I build useful intelligence that can</text>
      <g transform="translate(0 212)" fill="url(#ink)" font-size="30" font-weight="850" letter-spacing="0.2" class="sans">
        <text class="word1">RESEARCH · REASON · ACT</text>
        <text class="word2">RETRIEVE · CITE · EVALUATE</text>
        <text class="word3">SHIP · OBSERVE · IMPROVE</text>
      </g>

      <g transform="translate(0 284)" class="mono" font-size="11" font-weight="700" letter-spacing="1">
        <g><rect width="105" height="31" rx="15.5" fill="#ffffff" stroke="#d4d4d4"/><text x="18" y="19.5" fill="#262626">LLM APPS</text></g>
        <g transform="translate(116)"><rect width="76" height="31" rx="15.5" fill="#ffffff" stroke="#d4d4d4"/><text x="23" y="19.5" fill="#262626">RAG</text></g>
        <g transform="translate(203)"><rect width="95" height="31" rx="15.5" fill="#ffffff" stroke="#d4d4d4"/><text x="18" y="19.5" fill="#262626">AGENTS</text></g>
        <g transform="translate(309)"><rect width="125" height="31" rx="15.5" fill="#ffffff" stroke="#d4d4d4"/><text x="17" y="19.5" fill="#262626">EVALUATION</text></g>
      </g>

      <text y="354" fill="#a3a3a3" font-size="11" class="mono">LAHORE, PAKISTAN  /  BUILDING FOR THE WORLD</text>
      <rect class="cursor" x="409" y="343" width="7" height="13" fill="#171717"/>
    </g>

    <g transform="translate(844 76)">
      <g class="orbit" opacity="0.52">
        <ellipse cx="142" cy="139" rx="151" ry="103" fill="none" stroke="#d4d4d4" stroke-dasharray="4 10"/>
        <circle cx="8" cy="92" r="5" fill="#737373"/>
        <circle cx="274" cy="196" r="7" fill="#171717"/>
        <circle cx="213" cy="47" r="4" fill="#a3a3a3"/>
      </g>
      <ellipse cx="142" cy="294" rx="105" ry="18" fill="#000000" opacity="0.10"/>
      <g class="float" filter="url(#shadow)">
        <rect x="48" y="27" width="188" height="242" rx="42" fill="#ffffff" stroke="#e5e5e5" stroke-width="2"/>
        <rect x="27" y="96" width="25" height="82" rx="12" fill="#eeeeee" stroke="#d4d4d4"/>
        <rect x="232" y="96" width="25" height="82" rx="12" fill="#eeeeee" stroke="#d4d4d4"/>
        <rect x="69" y="67" width="146" height="91" rx="24" fill="#090909"/>
        <rect class="eye" x="103" y="98" width="9" height="24" rx="4.5" fill="#ffffff"/>
        <rect class="eye two" x="172" y="98" width="9" height="24" rx="4.5" fill="#ffffff"/>
        <g fill="#171717">
          <rect x="105" y="195" width="8" height="18" rx="4"/>
          <rect x="120" y="191" width="8" height="26" rx="4"/>
          <rect x="135" y="195" width="8" height="18" rx="4"/>
          <rect x="150" y="191" width="8" height="26" rx="4"/>
          <rect x="165" y="195" width="8" height="18" rx="4"/>
        </g>
        <circle cx="142" cy="238" r="7" fill="#e5e5e5" stroke="#d4d4d4"/>
      </g>
      <rect x="90" y="316" width="104" height="28" rx="14" fill="#ffffff" stroke="#d4d4d4" filter="url(#smallShadow)"/>
      <text x="142" y="334" text-anchor="middle" fill="#525252" font-size="10" font-weight="700" letter-spacing="1.4" class="mono">SYSTEM ONLINE</text>
    </g>
  </g>
  <rect x="1" y="1" width="1198" height="428" rx="27" fill="none" stroke="#d4d4d4" stroke-width="2"/>
</svg>
