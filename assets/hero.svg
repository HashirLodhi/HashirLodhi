<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Muhammad Hashir Lodhi — AI Engineer</title>
  <desc id="desc">Animated dark technology banner showing an AI network and the words research, reason, retrieve, and act.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="cyanGlow">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#94a3b8" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="1200" height="430" rx="28"/></clipPath>
  </defs>
  <style>
    .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
    .mono { font-family: "JetBrains Mono", Consolas, monospace; }
    .flow { stroke-dasharray: 8 12; animation: flow 8s linear infinite; }
    .node { animation: pulse 3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .node:nth-of-type(2n) { animation-delay: -1s; }
    .node:nth-of-type(3n) { animation-delay: -2s; }
    .word1 { animation: word1 9s ease-in-out infinite; }
    .word2 { opacity: 0; animation: word2 9s ease-in-out infinite; }
    .word3 { opacity: 0; animation: word3 9s ease-in-out infinite; }
    .cursor { animation: blink 1s steps(2, end) infinite; }
    .scan { animation: scan 7s ease-in-out infinite; }
    @keyframes flow { to { stroke-dashoffset: -160; } }
    @keyframes pulse { 0%,100% { opacity: .65; transform: scale(.9); } 50% { opacity: 1; transform: scale(1.15); } }
    @keyframes word1 { 0%,29% { opacity: 1; transform: translateY(0); } 33%,96% { opacity: 0; transform: translateY(7px); } 100% { opacity: 1; } }
    @keyframes word2 { 0%,29%,66%,100% { opacity: 0; transform: translateY(7px); } 33%,62% { opacity: 1; transform: translateY(0); } }
    @keyframes word3 { 0%,62%,100% { opacity: 0; transform: translateY(7px); } 66%,96% { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes scan { 0%,100% { transform: translateY(-40px); opacity: 0; } 20%,80% { opacity: .5; } 50% { transform: translateY(430px); opacity: .25; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } .word2,.word3 { display: none; } }
  </style>

  <g clip-path="url(#frame)">
    <rect width="1200" height="430" fill="url(#background)"/>
    <rect width="1200" height="430" fill="url(#grid)"/>
    <circle cx="170" cy="40" r="300" fill="url(#cyanGlow)"/>
    <circle cx="1090" cy="360" r="320" fill="url(#violetGlow)"/>
    <rect class="scan" x="0" y="-35" width="1200" height="2" fill="url(#accent)" opacity="0.4"/>

    <g transform="translate(58 52)">
      <rect width="180" height="31" rx="15.5" fill="#0e7490" fill-opacity="0.22" stroke="#22d3ee" stroke-opacity="0.65"/>
      <circle cx="18" cy="15.5" r="4" fill="#22d3ee" filter="url(#softGlow)"/>
      <text x="31" y="20.5" fill="#a5f3fc" font-size="12" font-weight="700" letter-spacing="1.8" class="mono">AI ENGINEER</text>

      <text y="105" fill="#f8fafc" font-size="45" font-weight="800" letter-spacing="-1.2" class="sans">MUHAMMAD HASHIR LODHI</text>
      <rect y="121" width="570" height="3" rx="1.5" fill="url(#accent)"/>

      <text y="172" fill="#94a3b8" font-size="20" font-weight="500" class="sans">I engineer AI systems that</text>
      <g transform="translate(0 202)" class="sans" font-size="31" font-weight="800" letter-spacing="0.4">
        <text class="word1" fill="url(#accent)">RESEARCH · REASON · ACT</text>
        <text class="word2" fill="url(#accent)">RETRIEVE · CITE · EVALUATE</text>
        <text class="word3" fill="url(#accent)">SHIP · OBSERVE · IMPROVE</text>
      </g>

      <g transform="translate(0 286)" class="mono" font-size="12" font-weight="700" letter-spacing="1.1">
        <g><rect width="112" height="32" rx="8" fill="#0f766e" fill-opacity="0.22" stroke="#2dd4bf" stroke-opacity="0.45"/><text x="18" y="20.5" fill="#99f6e4">LLM APPS</text></g>
        <g transform="translate(124)"><rect width="92" height="32" rx="8" fill="#0369a1" fill-opacity="0.22" stroke="#38bdf8" stroke-opacity="0.45"/><text x="21" y="20.5" fill="#bae6fd">RAG</text></g>
        <g transform="translate(228)"><rect width="104" height="32" rx="8" fill="#6d28d9" fill-opacity="0.20" stroke="#a78bfa" stroke-opacity="0.45"/><text x="18" y="20.5" fill="#ddd6fe">AGENTS</text></g>
        <g transform="translate(344)"><rect width="134" height="32" rx="8" fill="#334155" fill-opacity="0.32" stroke="#94a3b8" stroke-opacity="0.38"/><text x="17" y="20.5" fill="#cbd5e1">EVALUATION</text></g>
      </g>

      <text y="358" fill="#64748b" font-size="12" class="mono">LAHORE, PAKISTAN  //  BUILDING PRACTICAL INTELLIGENCE</text>
      <rect class="cursor" x="461" y="346" width="8" height="14" fill="#22d3ee"/>
    </g>

    <g transform="translate(805 54)" fill="none">
      <path class="flow" d="M88 53L215 86L280 182L210 287L76 270L25 165Z" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
      <path class="flow" d="M88 53L136 160L215 86M136 160L280 182M136 160L210 287M136 160L76 270M136 160L25 165" stroke="#22d3ee" stroke-width="1.5" opacity="0.42"/>
      <path d="M25 165L76 270M215 86L210 287" stroke="#a78bfa" stroke-width="1" opacity="0.24"/>

      <g filter="url(#softGlow)">
        <circle class="node" cx="88" cy="53" r="7" fill="#22d3ee"/>
        <circle class="node" cx="215" cy="86" r="8" fill="#38bdf8"/>
        <circle class="node" cx="280" cy="182" r="7" fill="#a78bfa"/>
        <circle class="node" cx="210" cy="287" r="8" fill="#8b5cf6"/>
        <circle class="node" cx="76" cy="270" r="7" fill="#2dd4bf"/>
        <circle class="node" cx="25" cy="165" r="6" fill="#67e8f9"/>
        <circle class="node" cx="136" cy="160" r="14" fill="#f8fafc"/>
      </g>

      <circle cx="136" cy="160" r="42" stroke="#22d3ee" stroke-opacity="0.18"/>
      <circle cx="136" cy="160" r="64" stroke="#a78bfa" stroke-opacity="0.11" stroke-dasharray="3 8"/>
      <text x="136" y="214" text-anchor="middle" fill="#94a3b8" font-size="10" letter-spacing="2" class="mono">INTELLIGENCE</text>
      <text x="136" y="230" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1.6" class="mono">CONNECTED TO ACTION</text>
    </g>
  </g>
  <rect x="1" y="1" width="1198" height="428" rx="27" fill="none" stroke="url(#accent)" stroke-opacity="0.28" stroke-width="2"/>
</svg>
