<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="285" viewBox="0 0 1200 285" role="img" aria-labelledby="title desc">
  <title id="title">A blueprint for dependable AI systems</title>
  <desc id="desc">A black and white six-stage flow from understanding a problem to retrieval, reasoning, tool use, evaluation, and delivery.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#f7f7f7"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#171717"/><stop offset="1" stop-color="#737373"/></linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/></filter>
  </defs>
  <style>
    .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
    .mono { font-family: "JetBrains Mono", Consolas, monospace; }
    .connector { stroke-dasharray: 5 8; animation: travel 6s linear infinite; }
    .card { animation: breathe 4s ease-in-out infinite; }
    .card:nth-of-type(2n) { animation-delay: -2s; }
    @keyframes travel { to { stroke-dashoffset: -78; } }
    @keyframes breathe { 0%,100% { opacity: .86; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <rect width="1200" height="285" rx="24" fill="url(#paper)"/>
  <rect x="1" y="1" width="1198" height="283" rx="23" fill="none" stroke="#d4d4d4"/>
  <text x="42" y="40" fill="#404040" font-size="11" font-weight="700" letter-spacing="2.4" class="mono">A BLUEPRINT FOR DEPENDABLE AI</text>
  <text x="1158" y="40" text-anchor="end" fill="#d4d4d4" font-size="10" letter-spacing="1.5" class="mono">SYSTEM / 01</text>

  <g stroke="url(#line)" stroke-width="1.5" fill="none" opacity="0.58">
    <path class="connector" d="M196 131H230"/><path class="connector" d="M386 131H420"/><path class="connector" d="M576 131H610"/><path class="connector" d="M766 131H800"/><path class="connector" d="M956 131H990"/>
  </g>

  <g class="sans">
    <g class="card" transform="translate(40 70)" filter="url(#shadow)"><rect width="156" height="122" rx="16" fill="#ffffff" stroke="#a3a3a3"/><circle cx="28" cy="28" r="13" fill="#111111"/><text x="28" y="33" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800">1</text><text x="18" y="68" fill="#111111" font-size="15" font-weight="750">UNDERSTAND</text><text x="18" y="91" fill="#737373" font-size="11">intent · context</text><text x="18" y="108" fill="#737373" font-size="11">constraints</text></g>
    <g class="card" transform="translate(230 70)" filter="url(#shadow)"><rect width="156" height="122" rx="16" fill="#ffffff" stroke="#b5b5b5"/><circle cx="28" cy="28" r="13" fill="#262626"/><text x="28" y="33" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800">2</text><text x="18" y="68" fill="#111111" font-size="15" font-weight="750">RETRIEVE</text><text x="18" y="91" fill="#737373" font-size="11">evidence · memory</text><text x="18" y="108" fill="#737373" font-size="11">semantic search</text></g>
    <g class="card" transform="translate(420 70)" filter="url(#shadow)"><rect width="156" height="122" rx="16" fill="#ffffff" stroke="#c0c0c0"/><circle cx="28" cy="28" r="13" fill="#404040"/><text x="28" y="33" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800">3</text><text x="18" y="68" fill="#111111" font-size="15" font-weight="750">REASON</text><text x="18" y="91" fill="#737373" font-size="11">plan · synthesize</text><text x="18" y="108" fill="#737373" font-size="11">structure</text></g>
    <g class="card" transform="translate(610 70)" filter="url(#shadow)"><rect width="156" height="122" rx="16" fill="#ffffff" stroke="#c7c7c7"/><circle cx="28" cy="28" r="13" fill="#525252"/><text x="28" y="33" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800">4</text><text x="18" y="68" fill="#111111" font-size="15" font-weight="750">USE TOOLS</text><text x="18" y="91" fill="#737373" font-size="11">APIs · actions</text><text x="18" y="108" fill="#737373" font-size="11">real-time data</text></g>
    <g class="card" transform="translate(800 70)" filter="url(#shadow)"><rect width="156" height="122" rx="16" fill="#ffffff" stroke="#cecece"/><circle cx="28" cy="28" r="13" fill="#737373"/><text x="28" y="33" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800">5</text><text x="18" y="68" fill="#111111" font-size="15" font-weight="750">EVALUATE</text><text x="18" y="91" fill="#737373" font-size="11">grounding · safety</text><text x="18" y="108" fill="#737373" font-size="11">quality · cost</text></g>
    <g class="card" transform="translate(990 70)" filter="url(#shadow)"><rect width="170" height="122" rx="16" fill="#ffffff" stroke="#d4d4d4"/><circle cx="28" cy="28" r="13" fill="#a3a3a3"/><text x="28" y="33" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="800">6</text><text x="18" y="68" fill="#111111" font-size="15" font-weight="750">DELIVER</text><text x="18" y="91" fill="#737373" font-size="11">API · interface</text><text x="18" y="108" fill="#737373" font-size="11">observe · improve</text></g>
  </g>

  <g class="mono" font-size="10" font-weight="700" letter-spacing="1.2" fill="#525252">
    <text x="42" y="239">GROUNDING</text><circle cx="123" cy="235" r="2" fill="#d4d4d4"/>
    <text x="137" y="239">EVALUATION</text><circle cx="227" cy="235" r="2" fill="#d4d4d4"/>
    <text x="241" y="239">OBSERVABILITY</text><circle cx="352" cy="235" r="2" fill="#d4d4d4"/>
    <text x="366" y="239">SECURITY</text><circle cx="437" cy="235" r="2" fill="#d4d4d4"/>
    <text x="451" y="239">RELIABILITY</text>
  </g>
  <text x="1158" y="243" text-anchor="end" fill="#a3a3a3" font-size="10" class="mono">DESIGN → BUILD → MEASURE → ITERATE</text>
</svg>
